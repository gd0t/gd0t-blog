<!DOCTYPE html>
<!-- We add this namespace so the browser understands "th:" attributes -->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Java Blog</title>
</head>
<body>

    <h1>Welcome to My Tech Blog</h1>
    <hr>

    <!-- If there are no posts, show a friendly message -->
    <div th:if="${#lists.isEmpty(posts)}">
        <p>No blog posts found! Time to write one.</p>
    </div>

    <!-- Loop over the 'posts' list we packed into the Model in our Controller -->
    <div th:each="post : ${posts}" style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;">
        <!-- Replace the text inside <h2> with the post's title -->
        <h2 th:text="${post.title}">Placeholder Title</h2>
        
        <!-- Replace the text inside <small> with the post's creation date -->
        <small th:text="'Published on: ' + ${post.createdAt}">Date Placeholder</small>
        
        <!-- Replace the text inside <p> with the post's content -->
        <p th:text="${post.content}">Placeholder content...</p>
    </div>

</body>
</html>
