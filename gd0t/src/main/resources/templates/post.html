<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="'root@javadev:~/' + ${post.title}">Post Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container mt-5" style="max-width: 800px;">
        
        <div class="mb-4">
            <a th:href="@{/}" class="text-decoration-none fw-bold">< cd .. (Back to Home)</a>
        </div>

        <div class="card p-4">
            <h1 class="card-title fw-bold border-bottom border-success pb-3 prompt" th:text="${post.title}">Title</h1>
            
            <div class="text-muted small mb-4 mt-2">
                > timestamp: <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm:ss')}">Date</span>
            </div>
            
            <!-- Use white-space: pre-wrap so your paragraph breaks are respected -->
            <div class="card-body p-0" style="white-space: pre-wrap; font-size: 1.1rem;" th:text="${post.content}">
                Content goes here...
            </div>
        </div>
        
    </div>
</body>
</html>
