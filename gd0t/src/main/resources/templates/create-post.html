<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Create Post | DevBlog')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container mt-4" style="max-width: 800px;">
        <h2 class="mb-4 pb-2 border-bottom">Create a New Article</h2>
        
        <div class="card p-4 shadow-sm border-0">
            <form action="#" th:action="@{/new}" th:object="${post}" method="post">
                
                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">Post Title</label>
                    <input type="text" id="title" th:field="*{title}" class="form-control" required placeholder="Enter an engaging title...">
                </div>
                
                <div class="mb-4">
                    <label for="content" class="form-label fw-bold">Post Content</label>
                    <textarea id="content" th:field="*{content}" class="form-control" required rows="12" placeholder="Write your content here..."></textarea>
                </div>
                
                <div class="d-flex justify-content-between">
                    <a th:href="@{/}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary px-4">Publish Post</button>
                </div>
                
            </form>
        </div>
    </div>
    
    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
